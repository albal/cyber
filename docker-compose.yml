services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cyberscan
      POSTGRES_PASSWORD: cyberscan
      POSTGRES_DB: cyberscan
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cyberscan"]
      interval: 5s
      timeout: 5s
      retries: 12

  queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cyberscan
      MINIO_ROOT_PASSWORD: cyberscan-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./apps/backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12

  worker:
    build:
      context: ./apps/worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy
    # Privileged needed for naabu SYN scans; in production we use CAP_NET_RAW only
    cap_add:
      - NET_RAW
      - NET_ADMIN

  frontend:
    build:
      context: ./apps/frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

  # Pre-wired benign target for local testing
  juice-shop:
    image: bkimminich/juice-shop:v17.1.1
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  dbdata:
  miniodata:
