# Test target sidecar:
#   - serves /.well-known/cyberscan-*.txt from /var/www/well-known
#   - proxies everything else to juice-shop
#
# Frontend asset URL for this target: http://verify-target:3000
# To verify ownership, drop the token file into the well-known volume:
#   docker compose exec verify-target sh -c 'echo -n "$TOKEN" > /var/www/well-known/cyberscan-$TOKEN.txt'
events {}
http {
  server {
    listen 3000;
    server_name _;

    location ^~ /.well-known/ {
      root /var/www;
      autoindex off;
      default_type text/plain;
    }

    location / {
      proxy_pass http://juice-shop:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }
  }
}
