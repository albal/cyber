apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cyberscan.fullname" . }}-backend
  labels: {{ include "cyberscan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cyberscan
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cyberscan
        app.kubernetes.io/component: backend
    spec:
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: {{ include "cyberscan.image" (dict "name" .Values.backend.image.name "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ include "cyberscan.fullname" . }}-app
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 15
          resources: {{ toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cyberscan.fullname" . }}-backend
spec:
  selector:
    app.kubernetes.io/name: cyberscan
    app.kubernetes.io/component: backend
  ports:
    - port: 8000
      targetPort: 8000
