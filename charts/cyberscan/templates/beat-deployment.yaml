{{- if .Values.beat.enabled }}
# Celery Beat is a singleton — replicas: 1 with PDB minAvailable: 0 (the chart
# explicitly does not run multiple beats; that would double-fire schedules).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cyberscan.fullname" . }}-beat
  labels: {{ include "cyberscan.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate          # never run two beats at once
  selector:
    matchLabels:
      app.kubernetes.io/name: cyberscan
      app.kubernetes.io/component: beat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cyberscan
        app.kubernetes.io/component: beat
    spec:
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: beat
          image: {{ include "cyberscan.image" (dict "name" .Values.beat.image.name "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "cyberscan.fullname" . }}-app
          command: ["celery"]
          args: ["-A", "cyberscan_worker.celery_app:celery_app", "beat", "--loglevel=info"]
          resources: {{ toYaml .Values.beat.resources | nindent 12 }}
{{- end }}
