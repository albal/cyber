apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cyberscan.fullname" . }}-migrate
  annotations:
    # post-install/upgrade so the bitnami postgres subchart has time to
    # come up before alembic tries to connect. The init-container below
    # also blocks on pg_isready, so we don't depend on Helm's --wait
    # ordering to be sufficient on a slow node.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: {{ include "cyberscan.image" (dict "name" .Values.backend.image.name "Values" .Values) }}
          # We don't have psql/nc in the backend image; use a small Python
          # loop that imports the same psycopg the app uses. Aborts once a
          # connection succeeds; otherwise retries every 2s for 5 min.
          command:
            - python
            - -c
            - |
              import os, time, sys
              import psycopg
              url = os.environ["DATABASE_URL"].replace("+psycopg", "")
              deadline = time.time() + 300
              while time.time() < deadline:
                  try:
                      with psycopg.connect(url, connect_timeout=3) as c:
                          c.execute("SELECT 1")
                      sys.exit(0)
                  except Exception as exc:
                      print(f"postgres not ready: {exc}", flush=True)
                      time.sleep(2)
              sys.exit("timed out waiting for postgres")
          envFrom:
            - secretRef:
                name: {{ include "cyberscan.fullname" . }}-app
      containers:
        - name: migrate
          image: {{ include "cyberscan.image" (dict "name" .Values.backend.image.name "Values" .Values) }}
          envFrom:
            - secretRef:
                name: {{ include "cyberscan.fullname" . }}-app
          command: ["alembic", "upgrade", "head"]
