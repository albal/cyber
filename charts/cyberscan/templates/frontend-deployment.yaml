apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cyberscan.fullname" . }}-frontend
  labels: {{ include "cyberscan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cyberscan
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cyberscan
        app.kubernetes.io/component: frontend
    spec:
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: frontend
          image: {{ include "cyberscan.image" (dict "name" .Values.frontend.image.name "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: {{ printf "https://%s" .Values.global.domain | quote }}
          resources: {{ toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cyberscan.fullname" . }}-frontend
spec:
  selector:
    app.kubernetes.io/name: cyberscan
    app.kubernetes.io/component: frontend
  ports:
    - port: 3000
      targetPort: 3000
