{{- if .Values.networkPolicies.enabled }}
# Default-deny baseline for the release namespace, then explicit allows.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberscan.fullname" . }}-default-deny
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Backend: ingress from frontend; egress to Postgres + Redis + MinIO + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberscan.fullname" . }}-backend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: frontend
      ports:
        - { protocol: TCP, port: 8000 }
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports: [{ protocol: TCP, port: 5432 }]
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports: [{ protocol: TCP, port: 6379 }]
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports: [{ protocol: TCP, port: 9000 }]
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Workers: full external egress (they need to reach scan targets) plus
# the same in-cluster targets the backend uses.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberscan.fullname" . }}-workers
spec:
  podSelector:
    matchExpressions:
      - { key: app.kubernetes.io/component, operator: In,
          values: [worker-recon, worker-vuln, worker-tls, worker-passive, beat] }
  policyTypes: [Egress]
  egress:
    - {}   # workers scan the internet — no destination restriction
---
# Frontend: ingress from ingress-nginx; egress to backend + DNS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberscan.fullname" . }}-frontend
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports: [{ protocol: TCP, port: 3000 }]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backend
      ports: [{ protocol: TCP, port: 8000 }]
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
{{- end }}
