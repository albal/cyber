apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cyberscan.fullname" . }}-app
  labels: {{ include "cyberscan.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_SECRET_KEY: {{ randAlphaNum 48 | quote }}
  DATABASE_URL: {{ include "cyberscan.dbUrl" . | quote }}
  CELERY_BROKER_URL: {{ include "cyberscan.redisUrl" . | quote }}
  CELERY_RESULT_BACKEND: {{ printf "redis://%s-redis-master:6379/1" .Release.Name | quote }}
  S3_ENDPOINT: {{ printf "http://%s-minio:9000" .Release.Name | quote }}
  S3_ACCESS_KEY: {{ .Values.minio.auth.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.minio.auth.rootPassword | quote }}
  S3_BUCKET_ARTIFACTS: "cyberscan-artifacts"
  S3_BUCKET_FEEDS: "cyberscan-feeds"
  SEED_ADMIN_EMAIL: "admin@example.com"
  SEED_ADMIN_PASSWORD: {{ randAlphaNum 24 | quote }}
  CORS_ORIGINS: {{ printf "https://%s" .Values.global.domain | quote }}
