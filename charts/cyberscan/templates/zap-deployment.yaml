{{- if .Values.zap.enabled }}
# ZAP daemon (intentionally headless). The passive worker pool talks to it
# via ZAP_PROXY=http://<svc>:8090 — the worker still runs zap-baseline.py /
# zap-full-scan.py wrappers, but those scripts spin up against a *running*
# ZAP rather than starting one in-process. Deploying ZAP in a sidecar means
# we don't have to bake its 1GB+ image into every worker.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cyberscan.fullname" . }}-zap
  labels: {{ include "cyberscan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.zap.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cyberscan
      app.kubernetes.io/component: zap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cyberscan
        app.kubernetes.io/component: zap
    spec:
      securityContext: {{ toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: zap
          image: {{ .Values.zap.image | quote }}
          imagePullPolicy: {{ .Values.zap.pullPolicy | default "IfNotPresent" }}
          args:
            - "zap.sh"
            - "-daemon"
            - "-host"
            - "0.0.0.0"
            - "-port"
            - "8090"
            - "-config"
            - "api.disablekey=true"
            - "-config"
            - "api.addrs.addr.name=.*"
            - "-config"
            - "api.addrs.addr.regex=true"
          ports:
            - containerPort: 8090
              name: zap
          readinessProbe:
            tcpSocket: { port: 8090 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8090 }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources: {{ toYaml .Values.zap.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cyberscan.fullname" . }}-zap
spec:
  selector:
    app.kubernetes.io/name: cyberscan
    app.kubernetes.io/component: zap
  ports:
    - port: 8090
      targetPort: 8090
      name: zap
{{- end }}
