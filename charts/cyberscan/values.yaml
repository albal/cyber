global:
  image:
    registry: ghcr.io
    repository: cyberscan
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  domain: scan.example.com
  tls:
    enabled: false
    issuer: letsencrypt-prod

frontend:
  replicas: 1
  image:
    name: cyberscan-frontend
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

backend:
  replicas: 2
  image:
    name: cyberscan-backend
  env:
    FEEDS_USE_FIXTURES: "false"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

workers:
  recon:
    replicas: 1
    image: { name: cyberscan-worker }
    queues: "recon"
    keda: { min: 1, max: 5, lagTarget: 5 }
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1500m, memory: 1Gi }
  vuln:
    replicas: 1
    image: { name: cyberscan-worker }
    queues: "vuln"
    keda: { min: 1, max: 8, lagTarget: 5 }
    resources:
      requests: { cpu: 300m, memory: 512Mi }
      limits:   { cpu: 2000m, memory: 2Gi }
  tls:
    replicas: 1
    image: { name: cyberscan-worker }
    queues: "tls"
    keda: { min: 1, max: 4, lagTarget: 5 }
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }
  passive:
    replicas: 1
    image: { name: cyberscan-worker }
    queues: "passive"
    keda: { min: 1, max: 4, lagTarget: 2 }   # ZAP is heavy — scale less aggressively
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1000m, memory: 1500Mi }
  feeds:
    schedule: "0 */6 * * *"
    image: { name: cyberscan-worker }
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 1Gi }

beat:
  enabled: true
  image: { name: cyberscan-worker }
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 200m, memory: 256Mi }

keda:
  enabled: false   # opt-in: requires keda.sh installed in the cluster

serviceMonitor:
  enabled: false   # opt-in: requires Prometheus Operator
  interval: 30s
  additionalLabels: {}

zap:
  # When enabled, deploys the OWASP ZAP daemon as a separate pod and points
  # the passive worker pool at it (via ZAP_PROXY env). Off by default so
  # default installs stay lean; turn it on for production-grade ZAP scans.
  enabled: false
  image: zaproxy/zap-stable:2.16.0
  pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 1Gi }
    limits:   { cpu: 1500m, memory: 2Gi }

nucleiTemplates:
  # When enabled, a CronJob pulls fresh nuclei-templates into a shared PVC,
  # which every worker pool mounts read-only at /root/nuclei-templates.
  # Detections stay current without rolling worker pods.
  enabled: false
  schedule: "30 3 * * *"   # daily at 03:30 UTC
  persistence:
    size: 1Gi
    accessMode: ReadWriteMany   # ReadWriteOnce works only with a single worker replica
    storageClass: ""

dbBackup:
  # Scheduled pg_dump → MinIO. Off by default so the chart works without
  # an external storage backend; turn on when MinIO has lifecycle rules
  # configured for retention.
  enabled: false
  schedule: "0 2 * * *"    # daily at 02:00 UTC
  bucket: "cyberscan-backups"
  image: "minio/mc:RELEASE.2024-11-21T17-21-54Z"

notifications:
  smtp:
    host: ""
    port: 587
    user: ""
    password: ""
    from: "cyberscan@example.com"
    starttls: true

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: scan.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend

postgresql:
  enabled: true
  auth:
    username: cyberscan
    password: cyberscan
    database: cyberscan
  primary:
    persistence:
      size: 20Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

minio:
  enabled: true
  mode: standalone
  auth:
    rootUser: cyberscan
    rootPassword: cyberscan-secret
  defaultBuckets: "cyberscan-artifacts,cyberscan-feeds"
  persistence:
    size: 50Gi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

networkPolicies:
  enabled: false   # set true once you've audited cluster DNS / ingress labels
