name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    name: pytest (backend + worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend + worker deps (for tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e apps/backend[dev]
          pip install -e apps/worker[dev]

      - name: Run pytest
        run: pytest -q tests/integration

  build-images:
    name: docker build (no push)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, worker, frontend]
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.component }}
        uses: docker/build-push-action@v7
        with:
          context: apps/${{ matrix.component }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  e2e:
    name: playwright e2e (docker compose)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('tests/e2e/package.json') }}
          restore-keys: pw-${{ runner.os }}-

      - name: Boot the stack
        run: |
          cp .env.example .env
          docker compose up -d --build db queue minio backend worker frontend juice-shop verify-target
          echo "Waiting for backend healthcheck..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/healthz >/dev/null; then break; fi
            sleep 2
          done
          docker compose ps

      - name: Seed DB + feeds
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T backend python -m cyberscan_api.scripts.seed
          docker compose exec -T worker  python -m cyberscan_worker.feeds.seed_fixtures

      - name: Install Playwright deps
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: tests/e2e
        run: npx playwright test --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Backend logs on failure
        if: failure()
        run: docker compose logs --tail=200 backend worker frontend

      - name: Tear down
        if: always()
        run: docker compose down -v

  helm-lint:
    name: helm lint + kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: helm dependency update
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update charts/cyberscan

      - name: helm lint
        run: helm lint charts/cyberscan

      - name: helm template (smoke render)
        run: helm template cyberscan charts/cyberscan > rendered.yaml

      - name: kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: -strict -ignore-missing-schemas -summary rendered.yaml
