name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/cyberscan

jobs:
  images:
    name: build & push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, worker, frontend]
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push ${{ matrix.component }}
        uses: docker/build-push-action@v7
        with:
          context: apps/${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  helm-chart:
    name: package & push helm chart (OCI)
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: helm dependency update
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update charts/cyberscan

      - name: Resolve chart version
        id: chartver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            base=$(grep '^version:' charts/cyberscan/Chart.yaml | awk '{print $2}')
            echo "version=${base}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: helm package
        run: |
          helm package charts/cyberscan \
            --version "${{ steps.chartver.outputs.version }}" \
            --app-version "${{ steps.chartver.outputs.version }}" \
            --destination /tmp

      - name: Login to GHCR for OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: helm push (OCI)
        run: |
          helm push /tmp/cyberscan-${{ steps.chartver.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
